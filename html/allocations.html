<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Allocation Management</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

<div id="sidebar-container"></div>

<div class="main">

    <h1>📅 Allocation Management</h1>

    <div class="card">
        <input type="hidden" id="allocationId">

        <label>Vendor</label>
        <select id="vendor"></select>

        <label>Available Stall</label>
        <select id="stall"></select>

        <label>Market Date</label>
        <input type="date" id="allocationDate" required>

        <button onclick="addAllocation()">
            <i class="fa-solid fa-calendar-plus"></i> Allocate Stall
        </button>
    </div>

    <br>

    <div class="card">
        <div class="search-box">
            <input
                type="text"
                id="search"
                placeholder="Search Vendor"
                onkeyup="searchAllocation()">
        </div>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Vendor</th>
                    <th>Stall</th>
                    <th>Zone</th>
                    <th>Date</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody id="allocationTable"></tbody>
        </table>
    </div>

</div>

<script src="/js/common.js"></script>
<script src="/js/allocations.js"></script>

</body>
</html>
