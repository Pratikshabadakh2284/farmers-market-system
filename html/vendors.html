<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Vendors</title>

    <link rel="stylesheet" href="/css/style.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

    <div id="sidebar-container"></div>

    <div class="main">

        <h1>Vendor Management</h1>

        <div class="card">

            <h2>Add / Update Vendor</h2>

            <form id="vendorForm" novalidate>

                <input type="hidden" id="VendorID">

                <label for="VendorName">Vendor Name</label>
                <input type="text" id="VendorName" minlength="2" maxlength="100" placeholder="Enter vendor name"
                    required>

                <label for="PhoneNumber">Phone</label>
                <input type="tel" id="PhoneNumber" inputmode="numeric" maxlength="10" pattern="[0-9]{10}"
                    placeholder="Enter 10-digit phone number" required>

                <label for="Email">Email</label>
                <input type="email" id="Email" maxlength="100" placeholder="Enter email address" required>

                <label for="ProductType">Product Type</label>
                <select id="ProductType" required>
                    <option value="">Select product type</option>
                    <option value="Vegetables">Vegetables</option>
                    <option value="Fruits">Fruits</option>
                    <option value="Dairy">Dairy</option>
                    <option value="Bakery">Bakery</option>
                    <option value="Flowers">Flowers</option>
                    <option value="Honey">Honey</option>
                    <option value="Crafts">Crafts</option>
                    <option value="Other">Other</option>
                </select>

                <button type="submit" id="saveBtn">
                    <i class="fa-solid fa-floppy-disk"></i>
                    Save Vendor
                </button>

                <button type="button" id="updateBtn" onclick="updateVendor()" style="display:none;">
                    <i class="fa-solid fa-pen"></i>
                    Update Vendor
                </button>

                <button
    type="button"
    id="cancelVendorBtn"
    onclick="clearForm()"
    style="display:none;">
    <i class="fa-solid fa-xmark"></i>
    Cancel
</button>

            </form>

        </div>

        <br>

        <div class="card">

            <div class="search-box">

                <input type="text" id="search" placeholder="Search Vendor" onkeyup="searchVendor()">

            </div>

            <table>

                <thead>

                    <tr>

                        <th>ID</th>

                        <th>Name</th>

                        <th>Phone</th>

                        <th>Email</th>

                        <th>Product</th>

                        <th>Action</th>

                    </tr>

                </thead>

                <tbody id="vendorTable">

                </tbody>

            </table>

        </div>

    </div>

    <script src="/js/common.js"></script>
    <script src="/js/vendors.js"></script>

</body>

</html>
