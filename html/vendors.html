<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vendors</title>

<link rel="stylesheet" href="/css/style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="sidebar">

<h2>🌾 Farmers Market</h2>

<a href="/html/index.html"><i class="fa-solid fa-chart-line"></i> Dashboard</a>

<a href="/html/vendors.html" class="active"><i class="fa-solid fa-users"></i> Vendors</a>

<a href="/html/login.html"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>

</div>

<div class="main">

<h1>Vendor Management</h1>

<div class="card">

<h2>Add / Update Vendor</h2>

<form id="vendorForm">

<input type="hidden" id="VendorID">

<label>Vendor Name</label>

<input type="text" id="VendorName" required>

<label>Phone</label>

<input type="text" id="PhoneNumber" required>

<label>Email</label>

<input type="email" id="Email" required>

<label>Product Type</label>

<input type="text" id="ProductType" required>

<button type="submit">

<i class="fa-solid fa-floppy-disk"></i>

Save Vendor

</button>

</form>

</div>

<br>

<div class="card">

<div class="search-box">

<input
type="text"
id="searchVendor"
placeholder="Search Vendor">

<button onclick="searchVendor()">

<i class="fa-solid fa-magnifying-glass"></i>

Search

</button>

<button onclick="loadVendors()">

<i class="fa-solid fa-rotate"></i>

Refresh

</button>

</div>

<table>

<thead>

<tr>

<th>ID</th>

<th>Name</th>

<th>Phone</th>

<th>Email</th>

<th>Product</th>

<th>Action</th>

</tr>

</thead>

<tbody id="vendorTable">

</tbody>

</table>

</div>

</div>

<script src="/js/vendors.js"></script>

</body>

</html>
