<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Stalls</title>

<link rel="stylesheet" href="/css/style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body>

<div class="sidebar">

<h2>🌾 Farmers Market</h2>

<a href="/html/index.html"><i class="fa-solid fa-chart-line"></i> Dashboard</a>

<a href="/html/vendors.html"><i class="fa-solid fa-users"></i> Vendors</a>

</div>

<div class="main">

<h1>🏪 Stall Management</h1>

<div class="card">

<h2>Add / Update Stall</h2>

<form id="stallForm">

<input type="hidden" id="StallID">

<label>Stall Number</label>

<input type="text" id="StallNumber" required>

<label>Location Zone</label>

<select id="LocationZone">

<option>North</option>

<option>South</option>

<option>East</option>

<option>West</option>

</select>

<label>Rental Fee</label>

<input type="number" id="RentalFee" required>

<label>Status</label>

<select id="Status">

<option>Available</option>

<option>Occupied</option>

</select>

<button type="submit">

<i class="fa-solid fa-floppy-disk"></i>

Save Stall

</button>

</form>

</div>

<br>

<div class="card">

<div class="search-box">

<input
type="text"
id="search"
placeholder="Search Stall"
onkeyup="searchStall()">

</div>

<table>

<thead>

<tr>

<th>ID</th>

<th>Stall</th>

<th>Zone</th>

<th>Rental</th>

<th>Status</th>

<th>Action</th>

</tr>

</thead>

<tbody id="stallTable">

</tbody>

</table>

</div>

</div>

<script src="/js/stalls.js"></script>

</body>

</html>
